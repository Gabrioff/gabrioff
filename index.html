<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabrioff | Enlaces Oficiales</title>
    
    <!-- Tailwind CSS para el diseño rápido y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons para iconos hermosos y ligeros -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Configuración personalizada de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        blob: "blob 7s infinite",
                        'fade-in-up': "fadeInUp 0.8s ease-out forwards",
                        'bounce-subtle': "bounceSubtle 2s infinite"
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        },
                        fadeInUp: {
                            "0%": { opacity: "0", transform: "translateY(20px)" },
                            "100%": { opacity: "1", transform: "translateY(0)" }
                        },
                        bounceSubtle: {
                            "0%, 100%": { transform: "translateY(-5%)" },
                            "50%": { transform: "translateY(0)" }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Estilos base y utilidades para el efecto de cristal y animaciones en cascada */
        body {
            background-color: #0f172a; /* Slate 900 */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Retrasos para la animación de entrada de los botones */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }

        /* Ocultar elementos antes de la animación */
        .opacity-0-init { opacity: 0; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-4 relative overflow-x-hidden selection:bg-purple-500 selection:text-white">

    <!-- Fondos Animados (Blobs) -->
    <div class="fixed inset-0 w-full h-full z-0 overflow-hidden pointer-events-none flex justify-center items-center">
        <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob"></div>
        <div class="absolute top-1/3 right-1/4 w-72 h-72 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-1/4 left-1/2 w-72 h-72 bg-pink-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Contenedor Principal -->
    <main class="relative z-10 w-full max-w-md mx-auto flex flex-col items-center pt-8 pb-12">
        
        <!-- Sección de Perfil -->
        <header class="flex flex-col items-center text-center mb-8 animate-fade-in-up opacity-0-init">
            <div class="relative group cursor-pointer mb-4">
                <!-- Efecto de brillo detrás de la foto -->
                <div class="absolute -inset-1 bg-gradient-to-r from-purple-500 via-blue-500 to-pink-500 rounded-full blur opacity-70 group-hover:opacity-100 transition duration-500 group-hover:duration-200 animate-pulse"></div>
                <!-- Foto de perfil actualizada -->
                <img src="https://i.postimg.cc/5t99QwPT/photo-2025-12-17-13-45-30.jpg" 
                     alt="Foto de perfil de Gabrioff" 
                     class="relative w-28 h-28 object-cover rounded-full border-2 border-white/20 transition-transform duration-300 group-hover:scale-105">
            </div>
            
            <h1 class="text-3xl font-extrabold tracking-tight mb-2 flex items-center gap-2">
                Gabrioff
                <!-- Icono de verificado (opcional) -->
                <i data-lucide="badge-check" class="w-6 h-6 text-blue-400"></i>
            </h1>
            <p class="text-gray-300 text-sm font-medium px-4">
                Creador de Contenido | Desarrollador | Editor
            </p>
        </header>

        <!-- Sección de Enlaces (Botones) -->
        <nav class="w-full flex flex-col gap-4">
            
            <!-- Botón 1: App Beta -->
            <a href="https://darksong.vercel.app/" target="_blank" rel="noopener noreferrer" 
               class="opacity-0-init animate-fade-in-up delay-100 group relative w-full flex items-center p-4 glass-panel rounded-2xl hover:bg-white/10 hover:-translate-y-1 hover:shadow-[0_8px_30px_rgb(0,0,0,0.12)] hover:shadow-purple-500/20 transition-all duration-300 overflow-hidden">
                <!-- Brillo al hacer hover -->
                <div class="absolute inset-0 bg-gradient-to-r from-purple-500/0 via-purple-500/10 to-purple-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
                
                <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-purple-500/20 text-purple-400 mr-4 group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="rocket" class="w-6 h-6 group-hover:animate-bounce-subtle"></i>
                </div>
                <div class="flex-1 text-left">
                    <h2 class="text-base font-bold text-white group-hover:text-purple-300 transition-colors">Accede a la beta de la app</h2>
                    <p class="text-xs text-gray-400 mt-0.5">Prueba lo último antes que nadie</p>
                </div>
                <i data-lucide="chevron-right" class="w-5 h-5 text-gray-500 group-hover:text-white transition-colors transform group-hover:translate-x-1 duration-300"></i>
            </a>

            <!-- Botón 2: Comunidad Telegram -->
            <a href="https://t.me/gabrioffYT" target="_blank" rel="noopener noreferrer" 
               class="opacity-0-init animate-fade-in-up delay-200 group relative w-full flex items-center p-4 glass-panel rounded-2xl hover:bg-white/10 hover:-translate-y-1 hover:shadow-[0_8px_30px_rgb(0,0,0,0.12)] hover:shadow-blue-500/20 transition-all duration-300 overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-blue-500/0 via-blue-500/10 to-blue-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
                
                <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-blue-500/20 text-blue-400 mr-4 group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="send" class="w-6 h-6 group-hover:-translate-y-0.5 group-hover:translate-x-0.5 transition-transform duration-300"></i>
                </div>
                <div class="flex-1 text-left">
                    <h2 class="text-base font-bold text-white group-hover:text-blue-300 transition-colors">Únete a la comunidad</h2>
                    <p class="text-xs text-gray-400 mt-0.5">Interactúa en nuestro Telegram</p>
                </div>
                <i data-lucide="chevron-right" class="w-5 h-5 text-gray-500 group-hover:text-white transition-colors transform group-hover:translate-x-1 duration-300"></i>
            </a>

            <!-- Botón 3: Contacto / Contrataciones (Menú Desplegable) -->
            <div class="w-full opacity-0-init animate-fade-in-up delay-300 flex flex-col gap-2">
                <button onclick="toggleSubMenu('contactMenu')" 
                   class="group relative w-full flex items-center p-4 glass-panel rounded-2xl hover:bg-white/10 hover:-translate-y-1 hover:shadow-[0_8px_30px_rgb(0,0,0,0.12)] hover:shadow-pink-500/20 transition-all duration-300 overflow-hidden cursor-pointer">
                    <div class="absolute inset-0 bg-gradient-to-r from-pink-500/0 via-pink-500/10 to-pink-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
                    
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-pink-500/20 text-pink-400 mr-4 group-hover:scale-110 transition-transform duration-300">
                        <i data-lucide="code-2" class="w-6 h-6 group-hover:rotate-12 transition-transform duration-300"></i>
                    </div>
                    <div class="flex-1 text-left">
                        <h2 class="text-base font-bold text-white group-hover:text-pink-300 transition-colors">¿Buscas Programador o Editor?</h2>
                        <p class="text-xs text-gray-400 mt-0.5">Escríbeme para trabajar juntos</p>
                    </div>
                    <!-- Icono de flecha que girará -->
                    <i id="contactIcon" data-lucide="chevron-down" class="w-5 h-5 text-gray-500 group-hover:text-white transition-transform duration-300"></i>
                </button>

                <!-- Submenú Expandible -->
                <div id="contactMenu" class="hidden flex-col gap-2 pl-4 pr-4 pb-2 pt-1 opacity-0 transition-opacity duration-300">
                    <!-- Opción Telegram -->
                    <a href="https://t.me/Pepetrenchs" target="_blank" rel="noopener noreferrer" 
                       class="flex items-center p-3 glass-panel rounded-xl hover:bg-white/10 transition-colors group">
                        <div class="w-8 h-8 flex items-center justify-center rounded-lg bg-blue-500/20 text-blue-400 mr-3">
                            <i data-lucide="send" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
                        </div>
                        <span class="text-sm font-medium text-gray-200 group-hover:text-white">Escribir por Telegram</span>
                    </a>
                    
                    <!-- Opción TikTok -->
                    <a href="https://www.tiktok.com/" target="_blank" rel="noopener noreferrer" 
                       class="flex items-center p-3 glass-panel rounded-xl hover:bg-white/10 transition-colors group">
                        <div class="w-8 h-8 flex items-center justify-center rounded-lg bg-black/40 text-white mr-3 border border-gray-700">
                            <i data-lucide="video" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
                        </div>
                        <span class="text-sm font-medium text-gray-200 group-hover:text-white">Contáctame a mi DM en TikTok</span>
                    </a>
                </div>
            </div>

        </nav>

    </main>

    <!-- Inicialización de los Iconos y Lógica -->
    <script>
        lucide.createIcons();

        // Función para abrir y cerrar el menú desplegable de contacto
        function toggleSubMenu(id) {
            const menu = document.getElementById(id);
            const icon = document.getElementById('contactIcon');
            
            if (menu.classList.contains('hidden')) {
                // Abrir menú
                menu.classList.remove('hidden');
                menu.classList.add('flex');
                setTimeout(() => menu.classList.remove('opacity-0'), 10); // Animación suave
                icon.style.transform = 'rotate(180deg)';
            } else {
                // Cerrar menú
                menu.classList.add('opacity-0');
                icon.style.transform = 'rotate(0deg)';
                setTimeout(() => {
                    menu.classList.add('hidden');
                    menu.classList.remove('flex');
                }, 300); // Esperar a que termine la transición
            }
        }
    </script>
</body>
</html>

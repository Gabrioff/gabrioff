<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - GabrioffYT</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Fondo Animado */
        body {
            background-color: #050505;
            overflow-x: hidden;
        }
        
        /* Efecto Cristal */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Botones personalizados */
        .custom-btn {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .custom-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .custom-btn:hover::before {
            left: 100%;
        }

        .custom-btn:hover {
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); /* Brillo púrpura sutil */
        }

        /* Estilo específico para Telegram */
        .btn-telegram:hover {
            box-shadow: 0 0 20px rgba(34, 158, 217, 0.4);
            border-color: rgba(34, 158, 217, 0.5);
        }

        /* Estilo específico para Web */
        .btn-web:hover {
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
            border-color: rgba(236, 72, 153, 0.5);
        }

        .profile-glow {
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white relative selection:bg-purple-500 selection:text-white">

    <!-- Elementos de fondo decorativos (Blobs animados) -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Contenedor Principal -->
    <main class="w-full max-w-md p-6 mx-auto relative z-10">
        
        <!-- Tarjeta de Perfil -->
        <div class="glass-card rounded-3xl p-8 flex flex-col items-center text-center animate-float">
            
            <!-- Foto de Perfil / Avatar -->
            <div class="relative mb-6 group">
                <div class="w-28 h-28 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 p-1 profile-glow">
                    <!-- Imagen de Perfil -->
                    <div class="w-full h-full rounded-full bg-gray-900 flex items-center justify-center overflow-hidden">
                        <img src="https://i.postimg.cc/ht5Jfmjh/photo-2025-12-17-13-45-30.jpg" alt="Perfil GabrioffYT" class="w-full h-full object-cover rounded-full">
                    </div>
                </div>
                <!-- Icono de verificación -->
                <div class="absolute bottom-1 right-1 bg-blue-500 text-white rounded-full p-1 w-7 h-7 flex items-center justify-center border-2 border-gray-900" title="Verificado">
                    <i class="fa-solid fa-check text-xs"></i>
                </div>
            </div>

            <!-- Nombre y Bio -->
            <h1 class="text-3xl font-bold mb-1 tracking-wide">GabrioffYT</h1>
            <p class="text-gray-400 text-sm mb-8 font-light tracking-wider">CREADOR DE CONTENIDO & DEV</p>

            <!-- Links -->
            <div class="w-full space-y-4">
                
                <!-- Link 1: Beta -->
                <a href="https://darksong.vercel.app/" target="_blank" class="custom-btn btn-web block w-full py-4 rounded-xl group relative">
                    <div class="flex items-center justify-between px-6">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 rounded-full bg-pink-500/10 flex items-center justify-center group-hover:bg-pink-500/20 transition-colors">
                                <i class="fa-solid fa-rocket text-pink-400 text-xl group-hover:scale-110 transition-transform"></i>
                            </div>
                            <span class="font-medium text-lg tracking-wide">UNETE A LA BETA</span>
                        </div>
                        <i class="fa-solid fa-arrow-right text-gray-500 group-hover:text-white group-hover:translate-x-1 transition-all"></i>
                    </div>
                </a>

                <!-- Link 2: Telegram -->
                <a href="https://t.me/gabrioffYT" target="_blank" class="custom-btn btn-telegram block w-full py-4 rounded-xl group relative">
                    <div class="flex items-center justify-between px-6">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center group-hover:bg-blue-500/20 transition-colors">
                                <i class="fa-brands fa-telegram text-blue-400 text-2xl group-hover:scale-110 transition-transform"></i>
                            </div>
                            <span class="font-medium text-lg tracking-wide">COMUNIDAD TELEGRAM</span>
                        </div>
                        <i class="fa-solid fa-arrow-up-right-from-square text-gray-500 group-hover:text-white group-hover:translate-x-1 transition-all"></i>
                    </div>
                </a>

            </div>

            <!-- Footer -->
            <footer class="mt-10">
                <p class="text-xs text-gray-600">© 2025 Dark Song Project</p>
            </footer>
        </div>
    </main>

    <script>
        // Pequeño script para añadir interactividad al mover el mouse (efecto parallax sutil)
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.animate-blob');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            blobs.forEach((blob, index) => {
                const speed = (index + 1) * 20;
                blob.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body>
</html>
